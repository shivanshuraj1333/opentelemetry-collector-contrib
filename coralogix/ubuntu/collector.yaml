receivers:
  # OTLP receiver for receiving telemetry data from agents and applications
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 20
      http:
        endpoint: 0.0.0.0:4318

  # Jaeger receiver for traces
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_binary:
        endpoint: 0.0.0.0:6832
      thrift_compact:
        endpoint: 0.0.0.0:6831
      thrift_http:
        endpoint: 0.0.0.0:14268

  # Zipkin receiver for traces
  zipkin:
    endpoint: 0.0.0.0:9411

  # Prometheus receiver for metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 30s
          static_configs:
            - targets: ['localhost:8888']

processors:
  # Resource detection processor
  resourcedetection:
    detectors: ["env", "system"]
    timeout: 2s
    override: false
    system:
      hostname_sources: ["os"]
      resource_attributes:
        host.id:
          enabled: true
        host.name:
          enabled: true
        host.type:
          enabled: true
        os.type:
          enabled: true
        os.description:
          enabled: true

  # Resource processor to add metadata
  resource:
    attributes:
      - action: upsert
        key: service.name
        value: otel-collector-ubuntu
      - action: upsert
        key: service.version
        value: "1.0.0"
      - action: upsert
        key: deployment.environment
        value: production

  # Memory limiter
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

  # Batch processor
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Span metrics processor for generating RED metrics from traces
  spanmetrics:
    aggregation_cardinality_limit: 100000
    dimensions:
      - name: http.method
      - name: http.status_code
      - name: rpc.method
      - name: rpc.status_code
      - name: service.name
      - name: service.version
    histogram:
      explicit:
        buckets:
          - 1ms
          - 4ms
          - 10ms
          - 20ms
          - 50ms
          - 100ms
          - 200ms
          - 500ms
          - 1s
          - 2s
          - 5s
    metrics_expiration: 5m
    metrics_flush_interval: '30s'
    namespace: ""

  # Probabilistic sampler for traces
  probabilistic_sampler:
    mode: proportional
    sampling_percentage: 10

  # Transform processor for metrics
  transform:
    metric_statements:
      - context: metric
        statements:
          # Add service name to metrics
          - set(attributes["service.name"], resource.attributes["service.name"]) where resource.attributes["service.name"] != nil
          # Add host information to metrics
          - set(attributes["host.name"], resource.attributes["host.name"]) where resource.attributes["host.name"] != nil
          # Clean up unnecessary attributes
          - delete_key(attributes, "service_name") where attributes["service_name"] != nil
          - delete_key(attributes, "otel_scope_name") where attributes["otel_scope_name"] != nil

exporters:
  # Coralogix exporter
  coralogix:
    domain: ${env:CORALOGIX_DOMAIN}
    private_key: ${env:CORALOGIX_PRIVATE_KEY}
    application_name: ${env:CORALOGIX_APP_NAME:-ubuntu-cluster}
    subsystem_name: ${env:CORALOGIX_SUBSYSTEM:-collector}
    timeout: 30s
    logs:
      headers:
        X-Coralogix-Distribution: otel-collector-ubuntu/1.0.0
    metrics:
      headers:
        X-Coralogix-Distribution: otel-collector-ubuntu/1.0.0
    traces:
      headers:
        X-Coralogix-Distribution: otel-collector-ubuntu/1.0.0

  # Debug exporter for troubleshooting
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

  # Prometheus exporter for metrics
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otelcol
    const_labels:
      service: otel-collector-ubuntu

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133

  # ZPages extension for debugging
  zpages:
    endpoint: 0.0.0.0:55679

  # Pprof extension for profiling
  pprof:
    endpoint: 0.0.0.0:1777

  # File storage extension for persistence
  file_storage:
    directory: /var/lib/otelcol

service:
  extensions: [health_check, zpages, pprof, file_storage]
  
  pipelines:
    # Metrics pipeline
    metrics:
      receivers: [prometheus, spanmetrics]
      processors: [resourcedetection, resource, memory_limiter, transform, batch]
      exporters: [coralogix, debug, prometheus]

    # Logs pipeline
    logs:
      receivers: [otlp]
      processors: [resourcedetection, resource, memory_limiter, batch]
      exporters: [coralogix, debug]

    # Traces pipeline
    traces:
      receivers: [otlp, jaeger, zipkin]
      processors: [resourcedetection, resource, memory_limiter, probabilistic_sampler, batch]
      exporters: [coralogix, debug, spanmetrics]

  # Telemetry configuration
  telemetry:
    logs:
      level: info
      encoding: json
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    resource:
      service.name: otel-collector-ubuntu
      service.version: "1.0.0"
