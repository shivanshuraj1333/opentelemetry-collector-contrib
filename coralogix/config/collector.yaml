          - delete_key(body["metadata"], "managedFields")
    receivers:
      k8s_cluster:
        allocatable_types_to_report:
        - cpu
        - memory
        collection_interval: '30s'
        metrics:
          k8s.pod.status_reason:
            enabled: true
        resource_attributes:
          k8s.container.status.last_terminated_reason:
            enabled: true
          k8s.kubelet.version:
            enabled: true
          k8s.pod.qos_class:
            enabled: true
      k8sobjects:
        objects:
        - exclude_watch_type:
          - DELETED
          group: events.k8s.io
          mode: watch
          name: events
      k8sobjects/resource_catalog:
