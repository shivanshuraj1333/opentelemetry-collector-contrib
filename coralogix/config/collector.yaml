          processors:
          - memory_limiter
          - resource/metadata
          - resource/kube-events
          - resourcedetection/region
          - resourcedetection/env
          - k8sattributes
          - transform/k8s_attributes
          - transform/kube-events
          - transform/reduce
          - batch
          receivers:
          - k8sobjects
          - otlp
        logs/resource_catalog:
          exporters:
          - coralogix/resource_catalog
          processors:
          - memory_limiter
          - resourcedetection/resource_catalog
          - transform/entity-event
          - transform/remove_managed_fields
          - filter/workflow
          - resource/metadata
          - batch
          receivers:
          - k8sobjects/resource_catalog
        metrics:
          exporters:
          - coralogix
          processors:
          - memory_limiter
          - resource/metadata
          - resourcedetection/region
          - resourcedetection/env
          - k8sattributes
          - transform/k8s_attributes
          - metricstransform/k8s-dashboard
          - transform/k8s-dashboard
          - filter/k8s_extra_metrics
          - transform/reduce
          - transform/prometheus
          - batch
          receivers:
          - k8s_cluster
          - prometheus/k8s_extra_metrics
          - prometheus
          - otlp
        traces:
          exporters:
          - debug
          - coralogix
          processors:
          - memory_limiter
          - resource/metadata
          - resourcedetection/region
          - resourcedetection/env
          - k8sattributes
          - transform/k8s_attributes
          - transform/reduce
          - batch
          receivers:
          - otlp
      telemetry:
        logs:
          encoding: json
          level: 'info'
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
        resource:
          cx.agent.type: cluster-collector
          service.name: opentelemetry-collector
